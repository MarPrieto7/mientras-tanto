kind = "web"
previewPath = "/"
title = "Mientras tanto"
version = "1.0.0"
id = "artifacts/mientras-tanto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22133

[services.development]
run = "pnpm --filter @workspace/mientras-tanto run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mientras-tanto", "run", "build" ]
publicDir = "artifacts/mientras-tanto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22133"
BASE_PATH = "/"
